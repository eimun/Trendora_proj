services:
  - type: web
    name: trendora-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: trendora-db
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false
      - key: YOUTUBE_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.0

  - type: worker
    name: trendora-archiver
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python cron_archiver.py
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: trendora-db
          property: connectionString

  - type: worker
    name: trendora-predictor
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python cron_predictions.py
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: trendora-db
          property: connectionString

databases:
  - name: trendora-db
    databaseName: trendora
    user: trendora
